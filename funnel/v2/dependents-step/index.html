  <style>
    .progress__fill { width: 14%; }

    .dep-cards { display: flex; flex-direction: column; gap: 12px; }

    .dep-card {
      display: flex; align-items: center; gap: 16px;
      padding: 16px;
      background: #F3F7F7;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .dep-card.is-selected { border-color: #056257; background: #E4EEEE; }

    .dep-card__icon {
      flex-shrink: 0;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
    }

    .dep-card__label {
      flex: 1;
      font-family: 'Hauss', sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.5;
      color: #272727;
    }

    .dep-card__check {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2.75px solid #d4d4d4;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .dep-card.is-selected .dep-card__check {
      background: #056257;
      border-color: #056257;
    }
    .dep-card__check .check-icon { display: none; }
    .dep-card.is-selected .dep-card__check .check-icon { display: block; }
  </style>

  <script>
    var cards = document.querySelectorAll('.dep-card');
    var btnNext = document.getElementById('btnNext');

    cards.forEach(function(card) {
      card.addEventListener('click', function() {
        card.classList.toggle('is-selected');
        var anySelected = document.querySelector('.dep-card.is-selected');
        btnNext.disabled = !anySelected;
      });
    });

    btnNext.addEventListener('click', function() {
      var selected = [];
      document.querySelectorAll('.dep-card.is-selected').forEach(function(card) {
        selected.push(card.dataset.value);
      });
      sessionStorage.setItem('annuities_dependents', JSON.stringify(selected));
      EDS.navigate('../familiarity-step/');
    });
  </script>
