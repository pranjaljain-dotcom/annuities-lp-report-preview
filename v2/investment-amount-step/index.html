      color: #056257;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .amount-pill.is-selected { background: #E4EEEE; }
  </style>
</head>
<body>

      </div>
      <a class="nav__help" href="tel:4152759050">
        <span class="nav__help-label">Need help?</span>
        <span class="nav__help-number">(415) 275-9050</span>
      </a>
    </div>

    <div class="progress">
      <div class="progress__track"><div class="progress__fill"></div></div>
    </div>

    <div class="slide-container">
    <div class="slide-inner" id="slideInner">

    <div class="content">
      <div class="question-and-input">
        <p class="heading">How much do you want to put into an annuity?</p>

        <div class="input-group">
          <span class="input-label">Amount</span>
          <div class="input-wrapper" id="inputWrapper">
            <input id="amountInput" type="text" inputmode="numeric" placeholder="$0" />
          </div>
        </div>

        <div class="amount-pills">
          <button class="amount-pill" data-value="100000">$100,000</button>
          <button class="amount-pill" data-value="500000">$500,000</button>
          <button class="amount-pill" data-value="1000000">$1,000,000</button>
        </div>
      </div>
      <div class="spacer"></div>
    </div>

    </div></div>

    <div class="keyboard-wrapper" id="keyboardWrapper"></div>

    <div class="bottom-wrapper--v2" id="bottomWrapper">
      <div class="footer">
        <button class="btn-next" id="btnNext" disabled>Next</button>
      </div>
    </div>

  </div>

  <script src="../../components.js"></script>
  <script>
    var digits = '';
    var amountInput = document.getElementById('amountInput');
    var btnNext = document.getElementById('btnNext');
    var keyboardWrapper = document.getElementById('keyboardWrapper');
    var bottomWrapper = document.getElementById('bottomWrapper');

    var keyboard = document.createElement('div');
    EDS.buildIosKeyboard(keyboard);
    keyboardWrapper.appendChild(keyboard);

    function formatAmount(d) {
      if (!d) return '';
      return '$' + parseInt(d, 10).toLocaleString('en-US');
    }

    document.querySelectorAll('.amount-pill').forEach(function(pill) {
      pill.addEventListener('click', function() {
        document.querySelectorAll('.amount-pill').forEach(function(p) { p.classList.remove('is-selected'); });
        pill.classList.add('is-selected');
        digits = pill.dataset.value;
        amountInput.value = formatAmount(digits);
        btnNext.disabled = false;
      });
    });

    function onKey(key) {
      document.querySelectorAll('.amount-pill').forEach(function(p) { p.classList.remove('is-selected'); });
      if (key === 'delete') {
        digits = digits.slice(0, -1);
      } else if (key === 'noop' || key === 'return') {
        return;
      } else if (/^\d$/.test(key) && digits.length < 9) {
        digits += key;
      }
      amountInput.value = formatAmount(digits);
      btnNext.disabled = digits.length === 0;
    }

    EDS.initV2Keyboard(amountInput, keyboardWrapper, bottomWrapper, onKey);

    btnNext.addEventListener('click', function() {
      if (digits.length > 0) {
        EDS.navigate('../funding-source-step/');
      }
    });
  </script>
</body>
</html>
