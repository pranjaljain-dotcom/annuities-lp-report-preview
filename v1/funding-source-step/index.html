      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2.75px solid #d4d4d4;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .dep-card.is-selected .dep-card__check {
      background: #056257;
      border-color: #056257;
    }
    .dep-card__check .check-icon { display: none; }

  <script>
    var cards = document.querySelectorAll('.dep-card');
    var btnNext = document.getElementById('btnNext');

    cards.forEach(function(card) {
      card.addEventListener('click', function() {
        card.classList.toggle('is-selected');
        var anySelected = document.querySelector('.dep-card.is-selected');
        btnNext.disabled = !anySelected;
      });
    });

    btnNext.addEventListener('click', function() {
      var selected = [];
      document.querySelectorAll('.dep-card.is-selected').forEach(function(card) {
        selected.push(card.dataset.value);
      });
      sessionStorage.setItem('annuities_funding_source', JSON.stringify(selected));
      EDS.navigate('../state-step/');
    });
  </script>
