<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annuities – What's your birthdate?</title>
  <style>
    @font-face { font-family: 'Hauss'; src: url('../fonts/Hauss-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Hauss'; src: url('../fonts/Hauss-Medium.ttf') format('truetype'); font-weight: 500; }
    @font-face { font-family: 'Hauss'; src: url('../fonts/Hauss-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'Portada'; src: url('../fonts/Portada-Semibold.ttf') format('truetype'); font-weight: 600; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes slideInFromRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOutToLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-100%); opacity: 0; } }
    .slide-container { flex: 1; position: relative; overflow: hidden; }
    .slide-inner { position: absolute; inset: 0; display: flex; flex-direction: column; animation: slideInFromRight 0.32s cubic-bezier(0.4,0,0.2,1) both; }
    .slide-inner.is-leaving { animation: slideOutToLeft 0.32s cubic-bezier(0.4,0,0.2,1) both; pointer-events: none; }

    html, body { min-height: 100%; background: #e0e0e0; }
    body { display: flex; justify-content: center; align-items: flex-start; padding: 32px 0 48px; font-family: 'Hauss', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }

    .phone { width: 375px; min-height: 812px; background: #fff; display: flex; flex-direction: column; border-radius: 48px; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.18), 0 4px 12px rgba(0,0,0,0.1); position: relative; }

    .status-bar { height: 44px; position: relative; flex-shrink: 0; background: #fff; }
    .status-bar__time { position: absolute; left: 29.5px; top: calc(50% + 1px); transform: translateY(-50%); font-family: -apple-system,'SF Pro Text','Helvetica Neue',sans-serif; font-size: 15px; font-weight: 600; letter-spacing: -0.165px; color: #000; line-height: 1; }
    .status-bar__island { position: absolute; top: 0; left: 102px; width: 171px; height: 38px; background: #000; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
    .status-bar__icons { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 6px; }

    .nav { height: 52px; position: relative; flex-shrink: 0; background: #fff; }
    .nav__back { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; cursor: pointer; background: none; border: none; padding: 0; display: flex; align-items: center; justify-content: center; }
    .nav__logo { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); }
    .nav__help { position: absolute; right: 16px; top: 10px; display: flex; flex-direction: column; align-items: flex-end; text-decoration: none; }
    .nav__help-label { font-family: 'Hauss',sans-serif; font-weight: 500; font-size: 11px; line-height: 16px; color: #525252; text-transform: uppercase; letter-spacing: 0.01em; }
    .nav__help-number { font-family: 'Hauss',sans-serif; font-weight: 500; font-size: 13px; line-height: 18px; color: #04463E; }

    .progress { padding: 0 16px; flex-shrink: 0; background: #fff; }
    .progress__track { width: 100%; height: 8px; background: #F3F7F7; border-radius: 4px; overflow: hidden; }
    .progress__fill { height: 100%; width: 6%; background: #056257; border-radius: 4px; }

    .content { flex: 1; display: flex; flex-direction: column; padding: 36px 16px 112px; }
    .question-and-input { display: flex; flex-direction: column; gap: 36px; }
    .heading { font-family: 'Portada',Georgia,serif; font-weight: 600; font-size: 28px; line-height: 32px; letter-spacing: -0.03px; color: #272727; }
    .subtext { font-family: 'Hauss',sans-serif; font-weight: 400; font-size: 16px; line-height: 24px; color: #525252; margin-top: 12px; }

    .input-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .input-label { font-family: 'Hauss',sans-serif; font-weight: 500; font-size: 16px; line-height: 20px; color: #272727; }
    .input-wrapper { width: 100%; min-height: 56px; background: #fff; border: 2px solid #D4D4D4; border-radius: 8px; padding: 16px 14px; box-shadow: 0px 1px 2px 0px rgba(16,24,40,0.05); display: flex; align-items: center; transition: border-color 0.15s, box-shadow 0.15s; }
    .input-wrapper:focus-within { border-color: #056257; box-shadow: 0px 1px 2px 0px rgba(16,24,40,0.05), 0 0 0 3px rgba(5,98,87,0.12); }
    .input-wrapper.is-destructive { border-color: #F44B40; box-shadow: none; }
    .input-wrapper.is-destructive:focus-within { border-color: #F44B40; box-shadow: 0px 1px 2px 0px rgba(16,24,40,0.05), 0 0 0 3px rgba(244,75,64,0.12); }
    .alert-icon { flex-shrink: 0; display: none; margin-left: 8px; }
    .input-wrapper.is-destructive .alert-icon { display: block; }
    .hint-text { font-family: 'Hauss',sans-serif; font-weight: 400; font-size: 13px; line-height: 16px; color: #AD3530; display: none; margin-top: 4px; }
    .hint-text.visible { display: block; }
    .input-wrapper input { flex: 1; border: none; outline: none; font-family: 'Hauss',sans-serif; font-weight: 400; font-size: 16px; line-height: 24px; color: #272727; background: transparent; letter-spacing: 0.02em; }
    .input-wrapper input::placeholder { color: #7e7e7e; }

    .spacer { flex: 1; }

    .footer { background: #fff; padding: 16px; box-shadow: 0px -2px 4px 0px rgba(16,24,40,0.06), 0px -4px 8px 0px rgba(16,24,40,0.10); }
    .btn-next { width: 100%; min-height: 64px; background: #272727; border: 1px solid #272727; border-radius: 8px; box-shadow: 0px 1px 2px 0px rgba(16,24,40,0.05); display: flex; align-items: center; justify-content: center; padding: 16px 20px; cursor: pointer; font-family: 'Hauss',sans-serif; font-weight: 500; font-size: 19px; line-height: 24px; color: #fff; transition: background 0.15s; }
    .btn-next:hover { background: #3a3a3a; }
    .btn-next:active { background: #444; }

    .bottom-wrapper { position: absolute; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; z-index: 100; transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }

    @media (hover: none) and (pointer: coarse) {
      body { align-items: flex-start; padding: 0; background: #fff; }
      .phone { width: 100%; min-height: 100dvh; border-radius: 0; box-shadow: none; }
      .bottom-wrapper { position: fixed; bottom: 0; transform: none !important; }
      .keyboard { display: none !important; }
      .content { padding-bottom: 100px; }
    }

    /* Numeric keyboard */
    .keyboard { background: #CDD0D5; padding: 12px 4px 4px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 8px; user-select: none; }
    .kb-key { height: 54px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: default; background: #fff; box-shadow: 0 1px 0 rgba(0,0,0,0.35), inset 0 0 0 0.5px rgba(0,0,0,0.10); -webkit-tap-highlight-color: transparent; transition: background 0.06s; }
    .kb-key:active { background: #E5E5EA; }
    .kb-digit-main { font-size: 28px; font-weight: 300; color: #000; line-height: 1; font-family: -apple-system,'Helvetica Neue',Arial,sans-serif; }
    .kb-digit-sub { font-size: 9px; font-weight: 500; color: #000; letter-spacing: 0.08em; line-height: 1; margin-top: 1px; text-transform: uppercase; font-family: -apple-system,'Helvetica Neue',Arial,sans-serif; }
    .kb-key--special { background: #ADB5BD; box-shadow: 0 1px 0 rgba(0,0,0,0.35), inset 0 0 0 0.5px rgba(0,0,0,0.12); }
    .kb-key--special:active { background: #9ca3af; }
    .kb-del-icon { width: 22px; height: 17px; }
    .kb-home-bar { grid-column: 1/-1; height: 30px; display: flex; align-items: center; justify-content: center; background: #CDD0D5; margin: 4px -4px -4px; }
    .kb-home-bar__pill { width: 134px; height: 5px; background: #3a3a3c; border-radius: 3px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="phone">

    <div class="status-bar">
      <span class="status-bar__time">9:41</span>
      <div class="status-bar__island"></div>
      <div class="status-bar__icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="#000"/><rect x="4.5" y="5" width="3" height="7" rx="1" fill="#000"/><rect x="9" y="3" width="3" height="9" rx="1" fill="#000"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#000"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><circle cx="8" cy="11" r="1.2" fill="#000"/><path d="M5.2 8.2C6.0 7.4 7.0 7 8 7s2 .4 2.8 1.2" stroke="#000" stroke-width="1.3" stroke-linecap="round" fill="none"/><path d="M2.8 5.8C4.3 4.3 6.0 3.5 8 3.5s3.7.8 5.2 2.3" stroke="#000" stroke-width="1.3" stroke-linecap="round" fill="none"/><path d="M0.4 3.4C2.4 1.3 5.1 0 8 0s5.6 1.3 7.6 3.4" stroke="#000" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg>
        <svg width="25" height="13" viewBox="0 0 25 13" fill="none"><rect x="0.5" y="0.5" width="21" height="12" rx="3.5" stroke="#000" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="9" rx="2" fill="#000"/><path d="M23 4.5v4c.83-.5 1.5-1.2 1.5-2s-.67-1.5-1.5-2z" fill="#000" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="nav">
      <button class="nav__back" aria-label="Go back" onclick="history.back()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="#525252"/></svg>
      </button>
      <div class="nav__logo">
        <svg width="72" height="16" viewBox="0 0 72 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14.6888 1.78708V3.85791H18.8313V14.2134H20.9022V3.85791H25.0443V1.78708H14.6888ZM1.59998 1.78708V14.2134H10.7704V12.1421H3.67081V9.03563H9.83949V6.9648H3.67081V3.85791H10.7704V1.78708H1.59998ZM37.4707 1.78708V6.9648H31.2578V1.78708H29.1865V14.2134H31.2578V9.03563H37.4707V14.2134H39.5415V1.78708H37.4707ZM55.3898 2.95879C54.9697 2.53866 54.4709 2.20539 53.922 1.97801C53.3731 1.75063 52.7848 1.63361 52.1906 1.63361C51.5965 1.63361 51.0081 1.75063 50.4592 1.97801C49.9103 2.20539 49.4115 2.53866 48.9914 2.95879C48.7361 3.21451 48.2042 3.81231 48.0226 4.10675C48.8865 3.5735 49.9049 3.3467 50.9134 3.46293C51.922 3.57916 52.8621 4.03163 53.5821 4.74741C54.3021 5.4632 54.7601 6.40058 54.8823 7.40847C55.0044 8.41635 54.7836 9.43601 54.2555 10.3031L54.3253 10.2333C54.6282 10.0495 55.1282 9.6189 55.3898 9.35723C55.81 8.93711 56.1432 8.43834 56.3706 7.88942C56.598 7.3405 56.715 6.75216 56.715 6.15801C56.715 5.56386 56.598 4.97552 56.3706 4.4266C56.1432 3.87768 55.81 3.37891 55.3898 2.95879Z" fill="#056257"/><path d="M47.7197 10.6291C45.942 8.85147 44.8532 5.58162 46.8594 2.12498L45.9216 3.06275C44.6798 4.30456 43.9823 5.98879 43.9823 7.74494C43.9823 9.50108 44.68 11.1853 45.9218 12.427C47.1636 13.6688 48.8479 14.3664 50.604 14.3663C52.3601 14.3663 54.0443 13.6686 55.2861 12.4268L56.2239 11.4891C52.9319 13.4029 49.6561 12.5655 47.7197 10.6291ZM65.5768 14.4C68.585 14.4 70.5286 12.9095 70.5286 10.6026C70.5286 8.43967 69.0083 7.65735 66.555 7.09741L65.0522 6.76766C63.6991 6.46854 62.9656 6.12092 62.9656 5.14061C62.9656 4.14114 63.897 3.4954 65.3385 3.4954C66.6835 3.4954 67.8672 3.99492 68.5965 4.86844L70.1571 3.61397C69.2981 2.68499 67.7825 1.60001 65.3934 1.60001C62.6941 1.60001 60.7348 3.13516 60.7348 5.25067C60.7348 7.66487 62.7112 8.40181 64.4331 8.77411L66.101 9.14087C67.4196 9.42722 68.2978 9.81995 68.2978 10.8041C68.2978 11.8618 67.346 12.4677 65.687 12.4677C63.8774 12.4677 62.5095 11.5789 61.9363 10.6828L60.2238 11.9159C61.1058 13.1247 62.9639 14.4 65.5768 14.4Z" fill="#056257"/></svg>
      </div>
      <a class="nav__help" href="tel:4152759050">
        <span class="nav__help-label">Need help?</span>
        <span class="nav__help-number">(415) 275-9050</span>
      </a>
    </div>

    <div class="progress">
      <div class="progress__track"><div class="progress__fill"></div></div>
    </div>

    <div class="slide-container">
    <div class="slide-inner" id="slideInner">

    <div class="content">
      <div class="question-and-input">
        <p class="heading">What's your birthdate?</p>
        <p class="subtext">Your birthdate helps us estimate growth and income options designed for your timeline.</p>

        <div class="input-group">
          <span class="input-label">Date of birth</span>
          <div class="input-wrapper" id="inputWrapper">
            <input id="bdInput" type="text" inputmode="numeric" placeholder="mm/dd/yyyy" maxlength="10" autocomplete="bday" />
            <div class="alert-icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><g clip-path="url(#c)"><path d="M8 5.33V8M8 10.67H8.007M14.667 8A6.667 6.667 0 1 1 1.333 8a6.667 6.667 0 0 1 13.334 0Z" stroke="#F44B40" stroke-width="1.333" stroke-linecap="round" stroke-linejoin="round"/></g><defs><clipPath id="c"><rect width="16" height="16" fill="white"/></clipPath></defs></svg>
            </div>
          </div>
          <span class="hint-text" id="hintText"></span>
        </div>
      </div>
      <div class="spacer"></div>
    </div>

    <div class="bottom-wrapper">
      <div class="footer">
        <button class="btn-next" id="btnNext">Next</button>
      </div>
      <div class="keyboard" id="keyboard">
        <div class="kb-key" data-key="1"><span class="kb-digit-main">1</span><span class="kb-digit-sub">&nbsp;</span></div>
        <div class="kb-key" data-key="2"><span class="kb-digit-main">2</span><span class="kb-digit-sub">ABC</span></div>
        <div class="kb-key" data-key="3"><span class="kb-digit-main">3</span><span class="kb-digit-sub">DEF</span></div>
        <div class="kb-key" data-key="4"><span class="kb-digit-main">4</span><span class="kb-digit-sub">GHI</span></div>
        <div class="kb-key" data-key="5"><span class="kb-digit-main">5</span><span class="kb-digit-sub">JKL</span></div>
        <div class="kb-key" data-key="6"><span class="kb-digit-main">6</span><span class="kb-digit-sub">MNO</span></div>
        <div class="kb-key" data-key="7"><span class="kb-digit-main">7</span><span class="kb-digit-sub">PQRS</span></div>
        <div class="kb-key" data-key="8"><span class="kb-digit-main">8</span><span class="kb-digit-sub">TUV</span></div>
        <div class="kb-key" data-key="9"><span class="kb-digit-main">9</span><span class="kb-digit-sub">WXYZ</span></div>
        <div class="kb-key kb-key--special" data-key="noop"></div>
        <div class="kb-key" data-key="0"><span class="kb-digit-main">0</span><span class="kb-digit-sub">+</span></div>
        <div class="kb-key kb-key--special" data-key="delete">
          <svg class="kb-del-icon" viewBox="0 0 22 17" fill="none"><path d="M8 0L0 8.5L8 17H22V0H8Z" fill="#3a3a3c"/><path d="M12 5.5l5 6M17 5.5l-5 6" stroke="#ADB5BD" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="kb-home-bar"><div class="kb-home-bar__pill"></div></div>
      </div>
    </div>

    </div></div>
  </div>

  <script>
    const bdInput      = document.getElementById('bdInput');
    const inputWrapper = document.getElementById('inputWrapper');
    const hintText     = document.getElementById('hintText');
    const keyboard     = document.getElementById('keyboard');
    const bottomWrapper = document.querySelector('.bottom-wrapper');
    const isMobile     = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    // Format digits into mm/dd/yyyy, inserting slashes automatically
    function formatDate(digits) {
      if (digits.length <= 2) return digits;
      if (digits.length <= 4) return digits.slice(0,2) + '/' + digits.slice(2);
      return digits.slice(0,2) + '/' + digits.slice(2,4) + '/' + digits.slice(4,8);
    }

    // Strip raw digits from formatted string
    function getDigits(val) { return val.replace(/\D/g,''); }

    bdInput.addEventListener('keydown', (e) => {
      // Allow backspace to delete the slash too
      if (e.key === 'Backspace') {
        e.preventDefault();
        const digits = getDigits(bdInput.value);
        bdInput.value = formatDate(digits.slice(0,-1));
        clearError();
      }
    });

    bdInput.addEventListener('input', (e) => {
      // Only fires on mobile native keyboard
      const digits = getDigits(bdInput.value).slice(0,8);
      bdInput.value = formatDate(digits);
      clearError();
    });

    function clearError() {
      if (getDigits(bdInput.value).length > 0) {
        inputWrapper.classList.remove('is-destructive');
        hintText.classList.remove('visible');
      }
    }

    function getKbHeight() { return keyboard.offsetHeight; }
    function slideDown() { bottomWrapper.style.transform = `translateY(${getKbHeight()}px)`; }
    function slideUp()   { bottomWrapper.style.transform = 'translateY(0)'; }

    if (isMobile && window.visualViewport) {
      const update = () => {
        const kbH = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
        bottomWrapper.style.bottom = Math.max(0, kbH) + 'px';
      };
      window.visualViewport.addEventListener('resize', update);
      window.visualViewport.addEventListener('scroll', update);
    }

    if (!isMobile) {
      bottomWrapper.style.transition = 'none';
      slideDown();
      requestAnimationFrame(() => requestAnimationFrame(() => { bottomWrapper.style.transition = ''; }));
      bdInput.addEventListener('focus', slideUp);
      bdInput.addEventListener('blur', () => { setTimeout(() => { if (document.activeElement !== bdInput) slideDown(); }, 80); });

      keyboard.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const key = e.target.closest('[data-key]');
        if (!key) return;
        const val = key.dataset.key;
        const digits = getDigits(bdInput.value);
        if (val === 'delete') {
          bdInput.value = formatDate(digits.slice(0,-1));
        } else if (val !== 'noop' && digits.length < 8) {
          bdInput.value = formatDate(digits + val);
        }
        clearError();
      });
    }

    setTimeout(() => bdInput.focus(), 350);
    document.addEventListener('touchstart', function() { bdInput.focus(); }, { once: true, passive: true });

    function isValidDate(digits) {
      if (digits.length !== 8) return false;
      const mm = parseInt(digits.slice(0,2)), dd = parseInt(digits.slice(2,4)), yyyy = parseInt(digits.slice(4,8));
      if (mm < 1 || mm > 12) return false;
      if (dd < 1 || dd > 31) return false;
      if (yyyy < 1900 || yyyy > new Date().getFullYear()) return false;
      return true;
    }

    document.getElementById('btnNext').addEventListener('click', () => {
      const digits = getDigits(bdInput.value);
      if (!digits) {
        hintText.textContent = 'Enter your date of birth to continue.';
        inputWrapper.classList.add('is-destructive'); hintText.classList.add('visible'); return;
      }
      if (!isValidDate(digits)) {
        hintText.textContent = 'Please enter a valid date in mm/dd/yyyy format.';
        inputWrapper.classList.add('is-destructive'); hintText.classList.add('visible'); return;
      }
      inputWrapper.classList.remove('is-destructive'); hintText.classList.remove('visible');
      document.getElementById('slideInner').classList.add('is-leaving');
      setTimeout(() => { window.location.href = '../name-step/'; }, 300);
    });
  </script>
</body>
</html>
